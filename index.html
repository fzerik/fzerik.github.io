<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand -->
    <title>fzerik</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png">

    <!-- Meta Description -->
    <meta name="description" content="fzerik's links — projects, tools and code.">

    <!-- Keywords -->
    <meta name="keywords" content="fzerik, developer, projects, tools, github">

    <!-- Canonical URL -->
    <meta rel="canonical" href="https://fzerik.github.io">

    <!-- Author Information -->
    <meta name="author" content="fzerik">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

  </head>

<body>

    <div class="container">
        <div class="column">

            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="fzerik">

            <!-- Replace with your name or brand -->
            <h1>
              <div>fzerik</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Developer · projects, tools & code.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- GitHub -->
              <a class="button button-github" href="https://github.com/fzerik" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo">GitHub</a>

              <!-- PDF to Markdown tool -->
              <a class="button button-default" href="https://fzerik.github.io/pdf-to-markdown/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-code.svg" alt="Code Icon">PDF to Markdown Converter</a>

              <!--
                Add more buttons by copying a line above and changing the href.
                Browse 100+ branded button styles at https://github.com/sethcottle/littlelink
                or build your own at https://builder.littlelink.io
              -->

            </div>

            <footer>
              <a href="privacy.html">Privacy Policy</a> | Built with <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
            </footer>

        </div>
    </div>

</body>

</html>
